<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Historique | Simulation_RPR_v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <main class="max-w-6xl mx-auto py-12 px-6">
        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-8">
                <div class="bg-white rounded-2xl border border-gray-200 p-8 h-[600px] flex flex-col">
                    <div class="flex justify-between items-start mb-8">
                        <h1 class="text-xl font-bold">Simulation_RPR_v3.pdf</h1>
                        <span class="bg-green-100 text-green-700 text-[10px] px-2 py-1 rounded font-bold uppercase">Version Actuelle</span>
                    </div>
                    <div class="flex-grow bg-gray-100 rounded-xl border-2 border-dashed border-gray-200 flex items-center justify-center">
                        <div class="text-center text-gray-400">
                            <i class="fas fa-eye-slash text-4xl mb-4"></i>
                            <p class="text-sm">Aperçu protégé par filigrane dynamique</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Journal des versions</h3>
                <div class="relative pl-8 space-y-8 git-line">
                    <div class="relative">
                        <div class="absolute -left-[31px] w-4 h-4 bg-black rounded-full border-4 border-white z-10"></div>
                        <div class="bg-white p-4 rounded-xl border border-gray-200">
                            <p class="text-xs text-gray-400 mb-1">Aujourd'hui, 10:45</p>
                            <p class="text-sm font-bold">Mise à jour des paramètres</p>
                            <p class="text-xs text-blue-600 mt-1 italic">Par Alice Simon</p>
                        </div>
                    </div>
                    <div class="relative opacity-60">
                        <div class="absolute -left-[31px] w-4 h-4 bg-gray-300 rounded-full border-4 border-white z-10"></div>
                        <div class="bg-white p-4 rounded-xl border border-gray-200">
                            <p class="text-xs text-gray-400 mb-1">Hier, 16:30</p>
                            <p class="text-sm font-bold">Correction maillage</p>
                            <button class="text-[10px] text-gray-500 hover:text-black font-bold mt-2 uppercase tracking-tighter">Restaurer cette version</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
